<!DOCTYPE html>
<html>
<head>
<title>Responsive Design</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #fafafa;
    margin: 0;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 30px;
}

/* Container */
.container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

/* Card Styling */
.card {
    width: 30%;
    background-color: #ffffff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
}

/* Hover Effect */
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* Responsive for mobile */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
    }
}
</style>
</head>
<body>

<h1>Responsive Cards</h1>

<div class="container">
    <div class="card">
        <h3>Card 1</h3>
        <p>This is a simple responsive card.</p>
    </div>

    <div class="card">
        <h3>Card 2</h3>
        <p>This card has hover animation.</p>
    </div>

    <div class="card">
        <h3>Card 3</h3>
        <p>Looks clean and modern.</p>
    </div>
</div>

</body>
</html>
