<!DOCTYPE html>
<html>
<head>
<title>Landing Page</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

/* Hero Section */
.hero {
    background: linear-gradient(to right, #2563EB, #1E40AF);
    color: white;
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    margin-bottom: 20px;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    background-color: white;
    color: #2563EB;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #e0e7ff;
}

/* Features Section */
.features {
    text-align: center;
    padding: 40px 20px;
}

/* Feature Cards */
.feature-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.card {
    background: #ffffff;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* Contact Section */
.contact {
    background-color: #f0f0f0;
    text-align: center;
    padding: 40px 20px;
}

/* Responsive */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <h1>Welcome to My Website</h1>
    <p>This is a modern landing page</p>
    <button>Get Started</button>
</div>

<div class="features">
    <h2>Features</h2>

    <div class="feature-box">
        <div class="card">
            <h3>⚡ Fast Performance</h3>
            <p>Optimized for speed and efficiency.</p>
        </div>

        <div class="card">
            <h3>😊 User Friendly</h3>
            <p>Easy to use interface for everyone.</p>
        </div>

        <div class="card">
            <h3>🔒 Secure System</h3>
            <p>Top-level security to protect data.</p>
        </div>
    </div>
</div>

<div class="contact">
    <h2>Contact Us</h2>
    <p>Email: example@email.com</p>
    <p>Phone: 9876543210</p>
</div>

</body>
</html>
