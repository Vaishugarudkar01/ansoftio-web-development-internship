<!DOCTYPE html>
<html>

<head>
<title>Student Registration Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.container{
    width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 50px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px gray;
}

h1{
    text-align: center;
}

.inp{
    width: 98%;
    padding: 8px;
    margin-top: 5px;
}

button{
    width: 100%;
    padding: 10px;
    background-color: #800044;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 10px;
}

button:hover{
    background-color: #371132;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Registration Form</h1>

<form>

<label>Full Name:</label>
<input type="text" class="inp" placeholder="Enter your name">

<br><br>

<label>Email Address:</label>
<input type="email"  class="inp" placeholder="Enter your email">

<br><br>

<label>Password:</label>
<input type="password"  class="inp">

<br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male <br>
<input type="radio" name="gender"> Female

<br><br>

<label>Skills:</label><br>
<input type="checkbox"> HTML <br>
<input type="checkbox"> CSS <br>
<input type="checkbox"> JavaScript

<br><br>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
