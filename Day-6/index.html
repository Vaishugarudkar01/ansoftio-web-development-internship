<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #bf00ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #b3007d;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Contact Us</h2>

        <form>
            <!-- Full Name -->
            <label>Full Name</label>
            <input type="text" name="fullname" placeholder="Enter your name" required>

            <!-- Email -->
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>

            <!-- Subject -->
            <label>Subject</label>
            <input type="text" name="subject" placeholder="Enter subject" required>

            <!-- Message -->
            <label>Message</label>
            <textarea name="message" placeholder="Write your message..." required></textarea>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>
        </form>
    </div>

</body>
</html>
